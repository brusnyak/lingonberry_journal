<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal Pro — Premium</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <nav class="topbar glass">
      <div class="brand">Journal Pro</div>
      <div class="nav-links">
        <a href="/" class="active">Performance Insights</a>
        <a href="/weekly?account_id={{ selected_account_id }}">Weekly Review</a>
      </div>
      <div class="toolbar">
        <button id="themeToggle" class="btn ghost">🌗</button>
        <form method="get" class="inline-form">
          <select name="account_id" onchange="this.form.submit()">
            {% for a in accounts %}
            <option value="{{ a.id }}" {{ 'selected' if a.id == selected_account_id else '' }}>
              {{ a.name }} ({{ a.firm_name or 'prop' }})
            </option>
            {% endfor %}
          </select>
        </form>
        <span class="date">{{ now }}</span>
      </div>
    </nav>

    <main class="container" id="dashboardRoot">
        <!-- Dashboard populated by JS -->
    </main>

    <script>
      const payload = {{ payload_json|safe }};
      const root = document.getElementById("dashboardRoot");

      function pct(v) { return `${v >= 0 ? "+" : ""}${Number(v).toFixed(2)}%`; }
      function usd(v) {
        const val = Number(v);
        return `${val >= 0 ? "+" : "-"}$${Math.abs(val).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
      }

      function kpiCard(label, value, subtext = "", css = "") {
        return `
          <div class="kpi ${css}">
            <span>${label}</span>
            <b>${value}</b>
            ${subtext ? `<small class="muted">${subtext}</small>` : ""}
          </div>
        `;
      }

      const s = payload.stats;
      const ana = payload.analytics;

      root.innerHTML = `
        <section class="panel glass">
            <div class="panel-title">📉 Core Performance Metrics</div>
            <div class="kpi-grid">
                ${kpiCard("Net Profit", usd(s.balance - s.initial_balance), pct(s.growth_pct), s.growth_pct >= 0 ? "pos" : "neg")}
                ${kpiCard("Win Rate", `${s.win_rate.toFixed(1)}%`, `${s.wins}W - ${s.losses}L`)}
                ${kpiCard("Profit Factor", s.profit_factor.toFixed(2), "Gross Profit / Gross Loss", s.profit_factor >= 1.5 ? "pos" : "")}
                ${kpiCard("Sharpe Ratio", s.sharpe_ratio.toFixed(2), "Risk-Adjusted Return")}
                ${kpiCard("Max Drawdown", `${s.max_drawdown_pct.toFixed(2)}%`, "From Peak Equity", "neg")}
                ${kpiCard("Avg RR", `1:${s.avg_rr.toFixed(2)}`, "Per Trade")}
            </div>
        </section>

        <section class="split-7030">
            <div class="panel glass">
                <div class="panel-title">📈 Balance & Equity Analytics</div>
                <div style="height: 350px;">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>
            <div class="panel glass">
                <div class="panel-title">🧬 Strategy DNA</div>
                <div class="dna-container">
                    <canvas id="dnaChart"></canvas>
                    <div class="dna-info">
                        <div class="dna-score">${ana.dna_score.toFixed(1)}</div>
                        <div class="dna-tier">${ana.tier}</div>
                    </div>
                </div>
                <p class="muted" style="font-size: 0.85rem; margin-top: 20px; text-align: center;">
                    ${ana.insights}
                </p>
            </div>
        </section>

        <section class="two-col">
            <div class="panel glass">
                <div class="panel-title">🔀 Trade Direction Analysis</div>
                <div class="direction-grid">
                    <div class="dir-box long">
                        <div class="dir-header">🟢 Long <span class="muted">${ana.by_direction.long.count} trades</span></div>
                        <div class="dir-row"><span>Win Rate</span> <b>20.00%</b></div>
                        <div class="dir-row"><span>P/L</span> <b class="neg-txt">-$535.61</b></div>
                        <div class="dir-row"><span>Average</span> <b class="neg-txt">-$107.12</b></div>
                    </div>
                    <div class="dir-box short">
                        <div class="dir-header">🔴 Short <span class="muted">${ana.by_direction.short.count} trades</span></div>
                        <div class="dir-row"><span>Win Rate</span> <b>40.00%</b></div>
                        <div class="dir-row"><span>P/L</span> <b class="pos-txt">+$2,176.95</b></div>
                        <div class="dir-row"><span>Average</span> <b class="pos-txt">+$435.39</b></div>
                    </div>
                </div>
            </div>
            <div class="panel glass">
                <div class="panel-title">🎲 Monte Carlo Simulation</div>
                <div style="height: 250px;">
                    <canvas id="monteCarloChart"></canvas>
                </div>
                <div class="muted" style="font-size: 0.75rem; margin-top: 10px;">
                    Projected future profit distribution based on ${s.total_trades} trades.
                    Probability of positive outcome: <b>${payload.monte_carlo.stats.prob_positive.toFixed(1)}%</b>
                </div>
            </div>
        </section>

        <section class="two-col">
            <div class="panel glass">
                <div class="panel-title">📅 Profit by Day</div>
                <canvas id="weekdayChart" height="150"></canvas>
            </div>
            <div class="panel glass">
                <div class="panel-title">⏰ Profit by Hour</div>
                <canvas id="hourChart" height="150"></canvas>
            </div>
        </section>

        <section class="panel glass">
            <div class="panel-title">📑 Trade-by-Trade Table</div>
            <table class="grid-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>PnL</th>
                        <th>Status</th>
                        <th>Replay</th>
                    </tr>
                </thead>
                <tbody>
                    ${payload.trades.map(t => `
                        <tr>
                            <td>${t.ts_open.slice(5, 16).replace('T', ' ')}</td>
                            <td><b>${t.symbol}</b></td>
                            <td class="${String(t.direction).toUpperCase() === 'LONG' ? 'pos-txt' : 'neg-txt'}">${String(t.direction).toUpperCase()}</td>
                            <td>${t.entry}</td>
                            <td>${t.exit_price || '-'}</td>
                            <td class="${t.pnl_usd >= 0 ? 'pos-txt' : 'neg-txt'}">${usd(t.pnl_usd)}</td>
                            <td><span class="badge ${t.outcome}">${t.outcome}</span></td>
                            <td><button class="btn icon-btn" onclick="openPlayback(${t.id})">▶️</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </section>
      `;

      // --- Charts Implementation ---
      
      // Equity Chart
      const eqCtx = document.getElementById('equityChart').getContext('2d');
      const eqGradient = eqCtx.createLinearGradient(0, 0, 0, 400);
      eqGradient.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
      eqGradient.addColorStop(1, 'rgba(16, 185, 129, 0)');
      
      new Chart(eqCtx, {
        type: 'line',
        data: {
          labels: payload.equity.map(p => p.ts ? p.ts.slice(5, 10) : 'Start'),
          datasets: [{
            label: 'Balance',
            data: payload.equity.map(p => p.balance),
            borderColor: '#10b981',
            borderWidth: 2,
            fill: true,
            backgroundColor: eqGradient,
            tension: 0.3,
            pointRadius: 0
          }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
            }
        }
      });

      // DNA Radar Chart
      new Chart(document.getElementById('dnaChart'), {
        type: 'radar',
        data: {
          labels: ['Consistency', 'Reliability', 'Discipline', 'Profitability', 'Safety'],
          datasets: [{
            data: Object.values(ana.strategy_dna),
            backgroundColor: 'rgba(99, 102, 241, 0.2)',
            borderColor: '#6366f1',
            borderWidth: 2,
            pointBackgroundColor: '#6366f1'
          }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                r: {
                    angleLines: { color: 'rgba(255,255,255,0.1)' },
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    pointLabels: { color: '#9ca3af', font: { size: 10 } },
                    ticks: { display: false },
                    suggestedMin: 0,
                    suggestedMax: 10
                }
            }
        }
      });

      // Monte Carlo Simulation Chart
      new Chart(document.getElementById('monteCarloChart'), {
        type: 'line',
        data: {
          labels: payload.monte_carlo.simulations[0].map((_, i) => i),
          datasets: payload.monte_carlo.simulations.slice(0, 20).map(sim => ({
            data: sim,
            borderColor: 'rgba(99, 102, 241, 0.1)',
            borderWidth: 1,
            fill: false,
            pointRadius: 0
          }))
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
            }
        }
      });

      // Weekday / Hour Charts
      function renderBarChart(id, labels, dataMap) {
        const ctx = document.getElementById(id).getContext('2d');
        const vals = labels.map(l => (dataMap[l]?.pnl_usd || 0));
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              data: vals,
              backgroundColor: vals.map(v => v >= 0 ? '#10b981' : '#ef4444'),
              borderRadius: 4
            }]
          },
          options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
              y: { display: false }
            }
          }
        });
      }

      renderBarChart('weekdayChart', ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], ana.by_weekday);
      renderBarChart('hourChart', Array.from({length: 24}, (_, i) => String(i).padStart(2, '0') + ':00'), ana.by_hour);

      // Playback Logic
      window.openPlayback = async (tradeId) => {
          try {
              const res = await fetch(`/api/trades/${tradeId}/playback`);
              if (!res.ok) throw new Error("Playback failed");
              const data = await res.json();
              if (data.candles && data.candles.length > 0) {
                  alert(`📽️ Trade Replay for ${data.trade.symbol} started!\nLoaded ${data.candles.length} candles from cTrader.\n\n[Interactive Chart Coming Soon]`);
              } else {
                  alert(`⚠️ No candle data cached for trade #${tradeId}.`);
              }
          } catch (err) {
              alert("❌ Failed to fetch playback data: " + err.message);
          }
      };

      // Theme toggle support
      document.getElementById("themeToggle").onclick = () => {
        const rootHtml = document.documentElement;
        const current = rootHtml.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        rootHtml.setAttribute('data-theme', next);
      };

    </script>
  </body>
</html>
