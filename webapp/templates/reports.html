<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal — Reports</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <nav class="topbar">
      <div class="brand">📔 Trading Journal</div>
      <div class="nav-links">
        <a href="/">Stats</a>
        <a href="/reports" class="active">Reports</a>
      </div>
      <div class="date">{{ now }}</div>
    </nav>

    <main class="container">
      <!-- Tab headers -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('calendar')">
          📅 Daily PnL
        </button>
        <button class="tab" onclick="switchTab('trades')">
          📋 Closed Trades
        </button>
        <button class="tab" onclick="switchTab('charts')">📊 Charts</button>
      </div>

      <!-- Calendar Tab -->
      <div id="tab-calendar" class="tab-content">
        <div class="card">
          <div class="cal-header">
            <span class="cal-nav" id="calTitle">{{ month_label }}</span>
            <div style="margin-left: auto; display: flex; gap: 8px">
              <span class="stat-chip"
                >Monthly P&L: <b id="monthPnl">$0.00</b></span
              >
              <span class="stat-chip"
                >Trading Days: <b id="tradingDays">0</b></span
              >
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

      <!-- Closed Trades Tab -->
      <div id="tab-trades" class="tab-content" style="display: none">
        <div class="card">
          <div class="cal-header" style="margin-bottom: 12px">
            <input
              class="search-input"
              id="tradeSearch"
              placeholder="Search symbol..."
              onkeyup="filterTrades()"
            />
            <select
              class="search-input"
              id="outcomeFilter"
              onchange="filterTrades()"
              style="width: 120px"
            >
              <option value="">All Outcomes</option>
              <option value="TP">TP</option>
              <option value="SL">SL</option>
              <option value="MANUAL">Manual</option>
            </select>
          </div>
          <table class="trades-table" id="tradesTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Symbol</th>
                <th>Direction</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>P&L %</th>
                <th>RR</th>
                <th>Session</th>
                <th>Outcome</th>
              </tr>
            </thead>
            <tbody id="tradesTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Charts Tab -->
      <div id="tab-charts" class="tab-content" style="display: none">
        <div class="row two-col">
          <div class="card">
            <div class="card-title">Open Time (Hour)</div>
            <canvas id="chartHour" height="200"></canvas>
          </div>
          <div class="card">
            <div class="card-title">Buy vs Sell</div>
            <canvas id="chartDir" height="200"></canvas>
          </div>
          <div class="card">
            <div class="card-title">Outcome Breakdown</div>
            <canvas id="chartOutcome" height="200"></canvas>
          </div>
          <div class="card">
            <div class="card-title">P&L by Symbol</div>
            <canvas id="chartSymbol" height="200"></canvas>
          </div>
        </div>
      </div>
    </main>

    <script>
      const calendarData = {{ calendar_json|safe }};
      let allTrades = [];

      // ─── Tab switching ─────────────────────────────────────────────
      function switchTab(name) {
        document.querySelectorAll(".tab-content").forEach(el => el.style.display = "none");
        document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
        document.getElementById("tab-" + name).style.display = "block";
        event.target.classList.add("active");
      }

      // ─── Calendar ─────────────────────────────────────────────────
      function renderCalendar() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
        const startOffset = (firstDay + 6) % 7; // Mon start

        const grid = document.getElementById("calGrid");
        grid.innerHTML = "";

        // Headers
        ["MON","TUE","WED","THU","FRI","SAT","SUN"].forEach(d => {
          const h = document.createElement("div");
          h.className = "cal-header-cell";
          h.textContent = d;
          grid.appendChild(h);
        });

        // Empty cells before 1st
        for (let i = 0; i < startOffset; i++) {
          const empty = document.createElement("div");
          empty.className = "cal-cell empty";
          grid.appendChild(empty);
        }

        let monthPnl = 0, tradingDays = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const pnl = calendarData[key];
          const cell = document.createElement("div");
          cell.className = "cal-cell" + (d === now.getDate() ? " today" : "");

          let inner = `<span class="cal-day">${d}</span>`;
          if (pnl !== undefined) {
            const pct = pnl.toFixed(2);
            const cls = pnl >= 0 ? "pnl-pos" : "pnl-neg";
            inner += `<span class="cal-pnl ${cls}">${pnl >= 0 ? "+" : ""}${pct}%</span>`;
            monthPnl += pnl;
            tradingDays++;
          }
          cell.innerHTML = inner;
          grid.appendChild(cell);
        }

        document.getElementById("monthPnl").textContent = (monthPnl >= 0 ? "+" : "") + monthPnl.toFixed(2) + "%";
        document.getElementById("tradingDays").textContent = tradingDays;
      }

      // ─── Trades table ─────────────────────────────────────────────
      function renderTrades(trades) {
        const tbody = document.getElementById("tradesTbody");
        tbody.innerHTML = "";
        trades.forEach(t => {
          const pnlClass = t.pnl_pct >= 0 ? "green-text" : "red-text";
          const outClass = t.outcome === "TP" ? "badge pass" : t.outcome === "SL" ? "badge fail" : "badge neutral";
          tbody.innerHTML += `
            <tr>
              <td>${t.id}</td>
              <td><b>${t.symbol}</b></td>
              <td>${String(t.direction).toUpperCase() === "LONG" ? "🟢 Long" : "🔴 Short"}</td>
              <td>${t.entry}</td>
              <td>${t.exit_price || "—"}</td>
              <td class="${pnlClass}">${t.pnl_pct != null ? (t.pnl_pct >= 0 ? "+" : "") + t.pnl_pct.toFixed(2) + "%" : "Open"}</td>
              <td>1:${t.rr_ratio || "?"}</td>
              <td>${t.session || "—"}</td>
              <td><span class="${outClass}">${t.outcome}</span></td>
            </tr>`;
        });
      }

      function filterTrades() {
        const q = document.getElementById("tradeSearch").value.toLowerCase();
        const outcome = document.getElementById("outcomeFilter").value;
        const filtered = allTrades.filter(t =>
          t.symbol.toLowerCase().includes(q) &&
          (outcome === "" || t.outcome === outcome) &&
          t.outcome !== "OPEN"
        );
        renderTrades(filtered);
      }

      // ─── Charts ───────────────────────────────────────────────────
      function renderAnalyticsCharts(trades) {
        const closed = trades.filter(t => t.outcome !== "OPEN");

        // Hour distribution
        const hourCounts = Array(24).fill(0);
        closed.forEach(t => { if (t.ts_open) hourCounts[parseInt(t.ts_open.slice(11,13))]++; });
        new Chart(document.getElementById("chartHour"), {
          type: "bar",
          data: { labels: hourCounts.map((_, i) => i + "h"), datasets: [{ data: hourCounts, backgroundColor: "rgba(33,150,243,0.6)", borderRadius: 3 }] },
          options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#666", font: { size: 8 } }, grid: { color: "#1c2333" } }, y: { ticks: { color: "#666" }, grid: { color: "#1c2333" } } } }
        });

        // Buy vs Sell
        const longs = closed.filter(t => String(t.direction).toUpperCase() === "LONG").length;
        const shorts = closed.filter(t => String(t.direction).toUpperCase() === "SHORT").length;
        new Chart(document.getElementById("chartDir"), {
          type: "doughnut",
          data: { labels: ["Long", "Short"], datasets: [{ data: [longs, shorts], backgroundColor: ["rgba(76,175,80,0.7)", "rgba(244,67,54,0.7)"], borderWidth: 0 }] },
          options: { plugins: { legend: { labels: { color: "#aaa" } } } }
        });

        // Outcome
        const wins = closed.filter(t => t.outcome === "TP").length;
        const losses = closed.filter(t => t.outcome === "SL").length;
        const manual = closed.filter(t => t.outcome === "MANUAL").length;
        new Chart(document.getElementById("chartOutcome"), {
          type: "doughnut",
          data: { labels: ["TP", "SL", "Manual"], datasets: [{ data: [wins, losses, manual], backgroundColor: ["rgba(76,175,80,0.7)", "rgba(244,67,54,0.7)", "rgba(255,167,38,0.7)"], borderWidth: 0 }] },
          options: { plugins: { legend: { labels: { color: "#aaa" } } } }
        });

        // PnL by symbol
        const symMap = {};
        closed.forEach(t => { symMap[t.symbol] = (symMap[t.symbol] || 0) + (t.pnl_pct || 0); });
        const symLabels = Object.keys(symMap);
        const symVals = symLabels.map(s => symMap[s]);
        new Chart(document.getElementById("chartSymbol"), {
          type: "bar",
          data: { labels: symLabels, datasets: [{ data: symVals, backgroundColor: symVals.map(v => v >= 0 ? "rgba(76,175,80,0.7)" : "rgba(244,67,54,0.7)"), borderRadius: 3 }] },
          options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#666", font: { size: 9 } }, grid: { color: "#1c2333" } }, y: { ticks: { color: "#666" }, grid: { color: "#1c2333" } } } }
        });
      }

      // ─── Init ─────────────────────────────────────────────────────
      renderCalendar();
      fetch("/api/trades").then(r => r.json()).then(trades => {
        allTrades = trades;
        filterTrades();
        renderAnalyticsCharts(trades);
      });
    </script>
  </body>
</html>
