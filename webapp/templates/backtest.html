<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structure Backtest — Lingonberry Journal</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .controls label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .controls select, .controls input, .controls button {
      background: var(--panel-solid);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .controls button {
      background: var(--accent);
      border-color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .controls button:hover { opacity: 0.85; }
    .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    #chart {
      width: 100%;
      height: 70vh;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stats {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .stats span strong { color: var(--text); }
    #legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    #error {
      color: var(--red);
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <h2 style="margin-bottom:12px; font-weight:600;">Structure Backtest</h2>

  <div class="controls">
    <label>Symbol
      <select id="symbol">
        <option value="EURUSD">EURUSD</option>
        <option value="XAUUSD">XAUUSD</option>
      </select>
    </label>
    <label>Timeframe
      <select id="timeframe">
        <option value="M5">M5</option>
        <option value="M15">M15</option>
        <option value="H1">H1</option>
      </select>
    </label>
    <label>Lookback (days)
      <input type="number" id="days" value="3" min="1" max="30" />
    </label>
    <label>Swing period
      <input type="number" id="swingPeriod" value="5" min="3" max="20" />
    </label>
    <label>
      <button id="loadBtn">Load & Analyse</button>
    </label>
  </div>

  <div id="legend"></div>
  <div id="chart"></div>
  <div class="stats" id="stats"></div>
  <div id="error"></div>

  <script src="/static/js/structure-overlay.js"></script>
  <script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: {
        background: { type: 'solid', color: '#0a0514' },
        textColor: '#b8a3c7',
      },
      grid: {
        vertLines: { color: 'rgba(186,85,211,0.05)' },
        horzLines: { color: 'rgba(186,85,211,0.05)' },
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
      },
      rightPriceScale: {
        borderColor: 'rgba(186,85,211,0.15)',
      },
      timeScale: {
        borderColor: 'rgba(186,85,211,0.15)',
        timeVisible: true,
        secondsVisible: false,
      },
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: '#10b981',
      downColor: '#ef4444',
      borderDownColor: '#ef4444',
      borderUpColor: '#10b981',
      wickDownColor: '#ef4444',
      wickUpColor: '#10b981',
    });

    const loadBtn = document.getElementById('loadBtn');
    const errorEl = document.getElementById('error');
    const statsEl = document.getElementById('stats');
    const legendEl = document.getElementById('legend');

    let currentOverlays = [];

    function clearOverlays() {
      for (const o of currentOverlays) {
        try { chart.removeSeries(o); } catch (_) {}
      }
      currentOverlays = [];
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function hideError() {
      errorEl.style.display = 'none';
    }

    async function loadStructure() {
      hideError();
      clearOverlays();
      loadBtn.disabled = true;
      loadBtn.textContent = 'Loading...';

      const symbol = document.getElementById('symbol').value;
      const timeframe = document.getElementById('timeframe').value;
      const days = document.getElementById('days').value;
      const swingPeriod = document.getElementById('swingPeriod').value;

      try {
        const resp = await fetch(
          `/api/analysis/structure/visualize?symbol=${symbol}&timeframe=${timeframe}&days=${days}&swing_period=${swingPeriod}`
        );
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        renderChart(data);
      } catch (e) {
        showError(e.message);
      } finally {
        loadBtn.disabled = false;
        loadBtn.textContent = 'Load & Analyse';
      }
    }

    function renderChart(data) {
      // Candles
      candleSeries.setData(data.candles);

      // Stats
      statsEl.innerHTML = `
        <span>Candles: <strong>${data.candles.length}</strong></span>
        <span>Swing Highs: <strong>${data.swing_highs.length}</strong></span>
        <span>Swing Lows: <strong>${data.swing_lows.length}</strong></span>
        <span>Breaks: <strong>${data.structure_breaks.length}</strong></span>
        <span>FVGs: <strong>${data.fvgs.length}</strong></span>
        <span>Order Blocks: <strong>${data.order_blocks.length}</strong></span>
        <span>Liquidity Levels: <strong>${data.liquidity_levels.length}</strong></span>
        <span>Sweeps: <strong>${data.liquidity_sweeps.length}</strong></span>
      `;

      // Legend
      legendEl.innerHTML = `
        <span class="legend-item"><span class="legend-dot" style="background:#f59e0b;"></span> Swing High</span>
        <span class="legend-item"><span class="legend-dot" style="background:#06b6d4;"></span> Swing Low</span>
        <span class="legend-item"><span class="legend-dot" style="background:#a78bfa;"></span> BOS</span>
        <span class="legend-item"><span class="legend-dot" style="background:#f43f5e;"></span> CHOCH</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(16,185,129,0.3);width:16px;border-radius:2px;"></span> FVG Bull</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(239,68,68,0.3);width:16px;border-radius:2px;"></span> FVG Bear</span>
        <span class="legend-item"><span class="legend-dot" style="background:#fff;"></span> Liquidity Level</span>
      `;

      // Render overlays — pass chart container for canvas layer
      const container = document.getElementById('chart');
      const overlay = new StructureOverlay(chart, candleSeries, data, container);
      overlay.renderAll();
      currentOverlays = overlay.getSeries();

      chart.timeScale().fitContent();
    }

    document.getElementById('loadBtn').addEventListener('click', loadStructure);

    // Auto-load on page open
    loadStructure();
  </script>

</body>
</html>
