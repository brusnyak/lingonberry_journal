<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Reviewer</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; font-size: 13px; display: flex; height: 100vh; overflow: hidden; }

  #sidebar { width: 300px; min-width: 300px; display: flex; flex-direction: column; border-right: 1px solid #222; background: #111; }
  #sidebar-header { padding: 10px 14px; border-bottom: 1px solid #222; font-size: 13px; font-weight: 600; color: #ccc; letter-spacing: 0.05em; }

  #config { padding: 10px 14px; border-bottom: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  #config label { font-size: 10px; color: #555; display: block; margin-bottom: 2px; }
  #config input, #config select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 4px 6px; border-radius: 3px; font-size: 11px; font-family: inherit; }
  #config .full { grid-column: 1 / -1; }
  #run-btn, #gold-events-btn { grid-column: 1 / -1; background: #2563eb; color: #fff; border: none; padding: 7px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
  #run-btn:hover { background: #1d4ed8; }
  #run-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
  #gold-events-btn { background: #92400e; }
  #gold-events-btn:hover { background: #b45309; }
  #gold-events-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

  #stats { padding: 7px 14px; border-bottom: 1px solid #222; display: flex; gap: 10px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-label { font-size: 9px; color: #555; }
  .stat-value { font-size: 12px; font-weight: 600; }
  .pos { color: #22c55e; } .neg { color: #ef4444; } .neu { color: #94a3b8; }

  #trade-list { flex: 1; overflow-y: auto; }
  .trade-item { padding: 7px 14px; border-bottom: 1px solid #181818; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .trade-item:hover { background: #181818; }
  .trade-item.active { background: #1e2a3a; border-left: 2px solid #2563eb; }
  .labeled-good { border-left: 3px solid #22c55e !important; }
  .labeled-bad  { border-left: 3px solid #ef4444 !important; }
  .labeled-skip { border-left: 3px solid #6b7280 !important; }
  .trade-num { font-size: 10px; color: #444; width: 22px; flex-shrink: 0; }
  .trade-date { font-size: 10px; color: #777; }
  .trade-dir { font-size: 10px; padding: 1px 4px; border-radius: 2px; font-weight: 600; }
  .dir-long { background: #0d2a1a; color: #22c55e; }
  .dir-short { background: #2a0d0d; color: #ef4444; }
  .trade-r { font-size: 11px; font-weight: 600; text-align: right; }
  .trade-exit { font-size: 10px; color: #555; text-align: right; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #chart-controls { padding: 8px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; background: #111; flex-shrink: 0; }
  #trade-meta { flex: 1; display: flex; gap: 14px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label { font-size: 9px; color: #555; }
  .meta-value { font-size: 12px; color: #ccc; }
  #nav-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .nav-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .nav-btn:hover { background: #222; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #counter { font-size: 11px; color: #555; min-width: 60px; text-align: center; }

  /* Draw toolbar */
  #draw-toolbar { padding: 5px 14px; border-bottom: 1px solid #222; display: flex; gap: 5px; align-items: center; background: #0f0f0f; flex-shrink: 0; flex-wrap: wrap; }
  #draw-toolbar span { font-size: 9px; color: #444; margin-right: 2px; }
  .draw-btn { padding: 3px 8px; border-radius: 3px; border: 1px solid #333; background: #1a1a1a; cursor: pointer; font-size: 10px; font-weight: 600; font-family: inherit; transition: all 0.1s; }
  .draw-btn:hover { background: #222; }
  .draw-btn.active { box-shadow: 0 0 0 1px currentColor; }
  .draw-btn[data-type="choch"] { color: #f97316; }
  .draw-btn[data-type="bos"]   { color: #3b82f6; }
  .draw-btn[data-type="sweep"] { color: #a855f7; }
  .draw-btn[data-type="liq"]   { color: #eab308; }
  .draw-btn[data-type="hh"]    { color: #22c55e; }
  .draw-btn[data-type="hl"]    { color: #86efac; }
  .draw-btn[data-type="ll"]    { color: #ef4444; }
  .draw-btn[data-type="lh"]    { color: #fca5a5; }
  .draw-btn[data-type="ob"]    { color: #f59e0b; }
  .draw-util-btn { padding: 3px 7px; border-radius: 3px; border: 1px solid #2a2a2a; background: #161616; cursor: pointer; font-size: 10px; color: #666; font-family: inherit; }
  .draw-util-btn:hover { color: #aaa; background: #222; }

  #chart-container { flex: 1; min-height: 0; position: relative; overflow: hidden; }
  #chart { position: absolute; inset: 0; }

  #label-panel { padding: 8px 14px; border-top: 1px solid #222; background: #111; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .label-btn { padding: 5px 14px; border-radius: 4px; border: 1px solid; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
  .label-btn.good  { background: #0d2a1a; border-color: #22c55e; color: #22c55e; }
  .label-btn.bad   { background: #2a0d0d; border-color: #ef4444; color: #ef4444; }
  .label-btn.skip  { background: #1a1a1a; border-color: #6b7280; color: #6b7280; }
  .label-btn.active { box-shadow: 0 0 0 2px currentColor; }
  #notes { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  #save-label-btn { background: #374151; border: 1px solid #4b5563; color: #d1d5db; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }

  #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 999; }
  #loading-text { font-size: 14px; color: #94a3b8; }
  .spinner { width: 18px; height: 18px; border: 2px solid #333; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loading-text">Running backtest…</div></div>

<div id="sidebar">
  <div id="sidebar-header">TRADE REVIEWER</div>

  <div id="config">
    <div>
      <label>Symbol</label>
      <select id="cfg-symbol">
        <option value="XAUUSD" selected>XAUUSD</option>
        <option value="XAGUSD">XAGUSD</option>
        <option value="EURUSD">EURUSD</option>
        <option value="GBPJPY">GBPJPY</option>
        <option value="GBPAUD">GBPAUD</option>
        <option value="GBPUSD">GBPUSD</option>
        <option value="NAS100">NAS100</option>
        <option value="US30">US30</option>
        <option value="SPX500">SPX500</option>
        <option value="ETHUSDT">ETHUSDT</option>
        <option value="DOGEUSDT">DOGEUSDT</option>
        <option value="XRPUSDT">XRPUSDT</option>
        <option value="BTCUSDT">BTCUSDT</option>
        <option value="SOLUSDT">SOLUSDT</option>
        <option value="BNBUSDT">BNBUSDT</option>
        <option value="LINKUSDT">LINKUSDT</option>
        <option value="AAVEUSDT">AAVEUSDT</option>
        <option value="SUIUSDT">SUIUSDT</option>
        <option value="AVAXUSDT">AVAXUSDT</option>
        <option value="WLDUSDT">WLDUSDT</option>
        <option value="NEARUSDT">NEARUSDT</option>
        <option value="1000PEPEUSDT">1000PEPEUSDT</option>
        <option value="HYPEUSDT">HYPEUSDT</option>
      </select>
    </div>
    <div>
      <label>TF</label>
      <select id="cfg-tf">
        <option value="5" selected>5m</option>
        <option value="15">15m</option>
        <option value="1">1m</option>
        <option value="30">30m</option>
        <option value="60">60m</option>
        <option value="240">240m</option>
      </select>
    </div>
    <div>
      <label>Start</label>
      <input type="date" id="cfg-start" value="2025-08-01">
    </div>
    <div>
      <label>End</label>
      <input type="date" id="cfg-end" value="2026-05-23">
    </div>
    <div>
      <label title="Hides exit price/PnL/R-multiple/exit reason and the stats bar. Use this before marking levels/bias so your read isn't anchored to the outcome.">
        <input type="checkbox" id="cfg-blind"> Blind review
      </label>
    </div>
    <div>
      <label>Strategy</label>
      <select id="cfg-strategy" onchange="toggleStrategy()">
        <option value="TrFvg" selected>TrFvg (FVG sweep)</option>
        <option value="TrIct">TrIct (ICT/SMC)</option>
        <option value="Lvl1Trend">Lvl1Trend (HTF EMA regime + VWAP, gated)</option>
        <option value="OrbWideStop">OrbWideStop (opening-range breakout + HTF trend filter)</option>
        <option value="IntradayMomentum">IntradayMomentum (first-half-hour predicts last-half-hour; FALSIFIED on NAS100/XAUUSD, see CLEAN.md #18)</option>
        <option value="OvernightDrift">OvernightDrift (long close-to-open; strong return, DD not yet prop-compliant, see CLEAN.md #20)</option>
      </select>
    </div>
    <div id="cfg-fvg-fields">
      <div>
        <label>SL pips</label>
        <input type="number" id="p-sl" value="200" min="1">
      </div>
      <div>
        <label>TP R</label>
        <input type="number" id="p-tp" value="2.0" step="0.1" min="0.5">
      </div>
      <div>
        <label>Gap ATR%</label>
        <input type="number" id="p-gap" value="0.2" step="0.05" min="0">
      </div>
      <div>
        <label>Direction</label>
        <select id="p-dir">
          <option value="bear" selected>bear</option>
          <option value="bull">bull</option>
          <option value="both">both</option>
        </select>
      </div>
      <div>
        <label>Risk %</label>
        <input type="number" id="p-risk" value="0.5" step="0.05" min="0.1">
      </div>
      <div>
        <label>Context bars</label>
        <input type="number" id="cfg-context" value="150" min="20">
      </div>
      <div>
        <label>Exchange</label>
        <select id="cfg-exchange">
          <option value="binance" selected>binance</option>
          <option value="bybit">bybit</option>
        </select>
      </div>
    </div>
    <div id="cfg-ict-fields" style="display:none">
      <div>
        <label>Risk %</label>
        <input type="number" id="p-risk-ict" value="0.5" step="0.05" min="0.1">
      </div>
      <div>
        <label>Min R:R</label>
        <input type="number" id="p-minrr" value="1.5" step="0.1" min="1.0">
      </div>
    </div>
    <button id="run-btn" onclick="runBacktest()">▶ RUN BACKTEST</button>
    <button id="gold-events-btn" onclick="loadGoldEvents()">LOAD GOLD ICT EVENTS</button>
    <button id="crypto-events-btn" onclick="loadCryptoRetestEvents()" style="grid-column:1/-1;background:#047857;color:#fff;border:none;padding:7px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">LOAD CRYPTO RETEST EVENTS</button>
    <button id="crypto-portfolio-btn" onclick="loadCryptoPortfolioCandidateEvents()" style="grid-column:1/-1;background:#0f766e;color:#fff;border:none;padding:7px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">LOAD SHOCK FORENSIC REVIEW</button>
    <button id="crypto-london-btn" onclick="loadCryptoLondonLongEvents()" style="grid-column:1/-1;background:#1d4ed8;color:#fff;border:none;padding:7px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">LOAD LONDON LONG REVIEW</button>
    <button id="crypto-london-setup-btn" onclick="loadCryptoLondonSetupLabEvents()" style="grid-column:1/-1;background:#4338ca;color:#fff;border:none;padding:7px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">LOAD LONDON SETUP LAB</button>
  </div>

  <div id="stats"></div>
  <div id="trade-list"></div>
</div>

<div id="main">
  <div id="chart-controls">
    <div id="trade-meta">
      <div class="meta-item"><div class="meta-label">ENTRY</div><div class="meta-value" id="m-entry">—</div></div>
      <div class="meta-item"><div class="meta-label">DIR</div><div class="meta-value" id="m-dir">—</div></div>
      <div class="meta-item"><div class="meta-label">R</div><div class="meta-value" id="m-r">—</div></div>
      <div class="meta-item"><div class="meta-label">PLANNED RR</div><div class="meta-value" id="m-rr">—</div></div>
      <div class="meta-item"><div class="meta-label">DURATION</div><div class="meta-value" id="m-duration">—</div></div>
      <div class="meta-item"><div class="meta-label">RETURN</div><div class="meta-value" id="m-return">—</div></div>
      <div class="meta-item"><div class="meta-label">EXIT</div><div class="meta-value" id="m-exit">—</div></div>
      <div class="meta-item"><div class="meta-label">REASON</div><div class="meta-value" id="m-reason">—</div></div>
    </div>
    <div id="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>◀</button>
      <span id="counter">—</span>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)" disabled>▶</button>
    </div>
  </div>

  <!-- Drawing toolbar -->
  <div id="draw-toolbar">
    <span>DRAW</span>
    <button class="draw-btn" data-type="choch" onclick="setDrawMode('choch')" title="1">ChoCH</button>
    <button class="draw-btn" data-type="bos"   onclick="setDrawMode('bos')"   title="2">BOS</button>
    <button class="draw-btn" data-type="sweep" onclick="setDrawMode('sweep')" title="3">Sweep</button>
    <button class="draw-btn" data-type="liq"   onclick="setDrawMode('liq')"   title="4">Liq</button>
    <button class="draw-btn" data-type="ob"    onclick="setDrawMode('ob')"    title="5">OB</button>
    <button class="draw-btn" data-type="fvg"   onclick="setDrawMode('fvg')"   title="6">FVG</button>
    <span style="margin-left:6px;border-left:1px solid #333;padding-left:6px;"></span>
    <button class="draw-btn" data-type="hh"    onclick="setDrawMode('hh')"    title="7">HH</button>
    <button class="draw-btn" data-type="hl"    onclick="setDrawMode('hl')"    title="8">HL</button>
    <button class="draw-btn" data-type="ll"    onclick="setDrawMode('ll')"    title="9">LL</button>
    <button class="draw-btn" data-type="lh"    onclick="setDrawMode('lh')"    title="0">LH</button>
    <button class="draw-util-btn" onclick="undoAnnotation()" title="Undo last">↩ Undo</button>
    <button class="draw-util-btn" onclick="clearAnnotations()" title="Clear all">✕ Clear</button>
    <label style="margin-left:8px;display:flex;align-items:center;gap:4px;font-size:10px;color:#f59e0b;cursor:pointer;">
      <input type="checkbox" id="toggle-structure" checked onchange="if(trades.length>0)showTrade(currentIdx)" style="accent-color:#f59e0b;">
      OB/Structure
    </label>
    <span id="draw-status" style="margin-left:10px;font-size:10px;color:#f97316;font-style:italic;"></span>
  </div>

  <div id="chart-container">
    <div id="chart"></div>
    <canvas id="draw-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:10;"></canvas>
  </div>

  <div id="label-panel">
    <button class="label-btn good" onclick="setLabel('good')">G GOOD</button>
    <button class="label-btn bad"  onclick="setLabel('bad')">B BAD</button>
    <button class="label-btn skip" onclick="setLabel('skip')">S SKIP</button>
    <input type="text" id="notes" placeholder="[tags] notes…">
    <button id="save-label-btn" onclick="saveLabel()">Save ↵</button>
  </div>
</div>

<script src="/static/js/drawing-engine.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let trades        = [];
let allCandles    = [];
let structureData = { pivots: [], bos_events: [] };
let isBlind       = false;
let currentIdx    = 0;
let currentSymbol   = 'XAUUSD';
let currentTf       = '5';
let currentStrategy = 'TrFvg';
let currentParams   = {};
let currentLabel  = null;
let userLabels    = {};   // key → {label, notes, annotations}

// ── Drawing state ─────────────────────────────────────────────────────────────
let drawMode      = null;
let drawingEngine = null;

// Tool mapping → DrawingEngine tool id
// hh/hl/ll/lh are NOT DrawingEngine tools — handled via chart.subscribeClick as candle markers
const TOOL_MAP = {
  choch: 'choch', bos: 'bos', sweep: 'sweep',
  liq: 'sweep', ob: 'rect', fvg: 'rect',
};
const LIQ_OVERRIDE = { label: 'Liq', stroke: '#eab308', dash: [4, 4] };
const MARKER_TOOLS = new Set(['hh', 'hl', 'll', 'lh']);
const MARKER_COLORS = { hh: '#22c55e', hl: '#86efac', ll: '#ef4444', lh: '#fca5a5' };

// ── Chart ─────────────────────────────────────────────────────────────────────
const chartContainer = document.getElementById('chart-container');
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  autoSize: true,
  layout: { background: { color: '#0d0d0d' }, textColor: '#888' },
  grid:    { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#222' },
  timeScale: { borderColor: '#222', timeVisible: true, secondsVisible: false },
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#22c55e', downColor: '#ef4444',
  borderUpColor: '#22c55e', borderDownColor: '#ef4444',
  wickUpColor: '#22c55e', wickDownColor: '#ef4444',
});

// Track lines separately: trade lines (entry/SL/TP) only
let tradeLines = [];

function clearTradeLines() {
  tradeLines.forEach(l => { try { candleSeries.removePriceLine(l); } catch(e){} });
  tradeLines = [];
}

function addTradeLine(price, color, title, style) {
  if (price == null) return;
  tradeLines.push(candleSeries.createPriceLine({ price, color, lineWidth: 1, lineStyle: style ?? 2, title }));
}

// ── DrawingEngine init ────────────────────────────────────────────────────────
function initDrawingEngine() {
  const canvas = document.getElementById('draw-canvas');
  drawingEngine = new DrawingEngine(chart, candleSeries, chartContainer, canvas);

  // Intercept addDrawing to handle hline label injection + sync
  // (drawing-added event is not fired for single-click hline tool)
  const _origAdd = drawingEngine.addDrawing.bind(drawingEngine);
  drawingEngine.addDrawing = function(partial) {
    const d = _origAdd(partial);
    if (drawMode === 'liq' && d.type === 'smc') {
      d.label = LIQ_OVERRIDE.label;
      d.style = { stroke: LIQ_OVERRIDE.stroke, dash: LIQ_OVERRIDE.dash };
      drawingEngine.redraw();
    }
    if (drawMode === 'fvg' && d.type === 'rect' && d.points.length === 2) {
      // Add CE midline for manually drawn FVGs
      const ce = (d.points[0].price + d.points[1].price) / 2;
      const ceColor = d.points[0].price > d.points[1].price ? '#22c55e' : '#ef4444';
      _origAdd({
        type: 'smc', source: null,
        points: [{ time: d.points[0].time, price: ce }, { time: d.points[1].time, price: ce }],
        style: { stroke: ceColor, dash: [3, 3] },
      });
    }
    _syncDrawings();
    setDrawMode(null);
    return d;
  };

  chartContainer.addEventListener('drawing-updated', _syncDrawings);
}

function _syncDrawings() {
  if (!trades[currentIdx] || !drawingEngine) return;
  const key = labelKey(trades[currentIdx]);
  if (!userLabels[key]) userLabels[key] = { label: null, notes: '' };
  userLabels[key].drawings = drawingEngine.state.drawings
    .filter(d => d.source !== 'auto')
    .map(d => ({ ...d }));
}

// ── Strategy toggle ────────────────────────────────────────────────────────────
function toggleStrategy() {
  const strat = document.getElementById('cfg-strategy').value;
  document.getElementById('cfg-fvg-fields').style.display = strat === 'TrFvg' ? '' : 'none';
  document.getElementById('cfg-ict-fields').style.display  = strat === 'TrIct' ? '' : 'none';
}

// ── Run backtest ──────────────────────────────────────────────────────────────
async function runBacktest() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  showLoading('Running backtest…');

  currentSymbol = document.getElementById('cfg-symbol').value;
  currentTf     = document.getElementById('cfg-tf').value;
  currentStrategy = document.getElementById('cfg-strategy').value;

  let params = {};
  if (currentStrategy === 'TrFvg') {
    params = {
      sl_buffer_pips:  parseFloat(document.getElementById('p-sl').value),
      tp1_r:           parseFloat(document.getElementById('p-tp').value),
      min_gap_atr_pct: parseFloat(document.getElementById('p-gap').value),
      direction:       document.getElementById('p-dir').value,
      risk_pct:        parseFloat(document.getElementById('p-risk').value) / 100,
      tp1_frac:        1.0,
    };
  } else if (currentStrategy === 'TrIct') {
    params = {
      risk_pct: parseFloat(document.getElementById('p-risk-ict').value) / 100,
      min_rr:   parseFloat(document.getElementById('p-minrr').value),
    };
  }
  currentParams = params;

  try {
    const resp = await fetch('/api/review/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        symbol: currentSymbol, tf: currentTf,
        start: document.getElementById('cfg-start').value || undefined,
        end:   document.getElementById('cfg-end').value   || undefined,
        strategy: currentStrategy, params,
        blind: document.getElementById('cfg-blind').checked,
      }),
    });
    const data = await resp.json();
    if (data.error) { alert(data.error + '\n' + (data.trace||'')); return; }

    trades        = data.trades || [];
    allCandles    = data.candles || [];
    structureData = data.structure || { pivots: [], bos_events: [] };
    isBlind        = !!data.blind;

// ── Show trade ────────────────────────────────────────────────────────────────
function showTrade(idx) {
  if (idx < 0 || idx >= trades.length) return;
  currentIdx = idx;

  document.querySelectorAll('.trade-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('ti-' + idx);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }

  const t = trades[idx];
  updateMeta(t);
  updateNav();

  // Restore label state
  const key = labelKey(t);
  const ul  = userLabels[key];
  currentLabel = ul ? ul.label : null;
  document.getElementById('notes').value = ul ? (ul.notes || '') : '';
  document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
  if (currentLabel) document.querySelector('.label-btn.' + currentLabel)?.classList.add('active');

  // Slice candles
  const entryTs = Math.floor(new Date(t.entry_time).getTime() / 1000);
  const ctx     = parseInt(document.getElementById('cfg-context').value) || 150;
  const entryI  = bisect(allCandles, entryTs);
  const lo      = Math.max(0, entryI - ctx);
  // Blind mode: hard-stop at the entry bar. No future bars rendered, period —
  // this is the actual leak (field-stripping alone doesn't fix it, the chart
  // always loaded what-happened-next by default).
  const hi      = isBlind
    ? Math.min(allCandles.length, entryI + 1)
    : Math.min(allCandles.length, entryI + Math.ceil(ctx * 0.5));
  const slice   = allCandles.slice(lo, hi);
  if (slice.length === 0) return;

  clearTradeLines();
  candleSeries.setData(slice);

  const isLong    = t.direction === 'LONG' || t.direction.toLowerCase().includes('long');
  const winStart  = slice[0].time;
  const winEnd    = slice[slice.length - 1].time;
  const showStruct = document.getElementById('toggle-structure')?.checked !== false;

  // Pivot markers (HH/HL/LL/LH) via lightweight-charts setMarkers
  const PIVOT_COLORS = { HH:'#22c55e', HL:'#86efac', LL:'#ef4444', LH:'#fca5a5' };
  const markers = [];
  if (showStruct) {
    (structureData.pivots || [])
      .filter(p => p.time >= winStart && p.time <= winEnd)
      .forEach(p => markers.push({
        time:     p.time,
        position: (p.kind === 'HH' || p.kind === 'LH') ? 'aboveBar' : 'belowBar',
        color:    PIVOT_COLORS[p.kind] || '#888',
        shape:    'circle', size: 0.5, text: p.kind,
      }));
  }
  // User-placed HH/HL/LL/LH markers
  ((ul && ul.markers) || [])
    .filter(m => m.time >= winStart && m.time <= winEnd)
    .forEach(m => markers.push(m));

  markers.push({
    time: entryTs, position: isLong ? 'belowBar' : 'aboveBar',
    color: isLong ? '#22c55e' : '#ef4444',
    shape: isLong ? 'arrowUp' : 'arrowDown', text: 'Entry',
  });
  candleSeries.setMarkers(markers.sort((a, b) => a.time - b.time));

  addTradeLine(t.entry_price, '#94a3b8', 'Entry', 2);
  addTradeLine(t.sl,          '#ef4444', 'SL',    3);
  addTradeLine(t.tp1,         '#22c55e', 'TP',    3);

  // Restore user drawings + render auto-structure via DrawingEngine
  if (drawingEngine) {
    drawingEngine.state.drawings = [];
    const saved = ul && ul.drawings ? ul.drawings : [];
    saved.forEach(d => drawingEngine.state.drawings.push({ ...d }));
    if (showStruct) _renderAutoStructure(t, winStart, winEnd, isLong);
    else drawingEngine.redraw();
  }

  chart.timeScale().setVisibleLogicalRange(isBlind
    ? { from: Math.max(0, slice.length - ctx), to: slice.length - 1 }
    : {
        from: (entryI - lo) - Math.floor(slice.length * 0.4),
        to:   (entryI - lo) + Math.ceil(slice.length  * 0.4),
      });
}

function _renderAutoStructure(t, winStart, winEnd, isLong) {
  // Per-trade OB rect
  const ob = isLong ? t.demand_ob : t.supply_ob;
  if (ob) {
    const obColor = isLong ? '#f59e0b' : '#ef4444';
    const obFill  = isLong ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.15)';
    const obEnd   = Math.min(winEnd, ob.time_end + 7200);
    drawingEngine.state.drawings.push({
      id: 'auto_ob', type: 'rect', source: 'auto', label: 'OB',
      points: [{ time: ob.time_start, price: ob.high }, { time: obEnd, price: ob.low }],
      style:  { stroke: obColor, fill: obFill },
    });
  }

  // Unmitigated FVGs — rect + CE midline
  (t.fvgs || []).forEach((fvg, i) => {
    if (fvg.c3_time < winStart || fvg.c1_time > winEnd) return;
    const isBull  = fvg.kind === 'bullish';
    const col     = isBull ? '#22c55e' : '#ef4444';
    const fill    = isBull ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
    const t1      = fvg.c1_time;
    const t2      = Math.min(winEnd, fvg.c3_time + 7200);
    const ce      = (fvg.top + fvg.bottom) / 2;
    drawingEngine.state.drawings.push({
      id: 'auto_fvg_' + i, type: 'rect', source: 'auto',
      points: [{ time: t1, price: fvg.top }, { time: t2, price: fvg.bottom }],
      style: { stroke: col, fill },
    });
    // CE midline
    drawingEngine.state.drawings.push({
      id: 'auto_fvg_ce_' + i, type: 'smc', source: 'auto',
      points: [{ time: t1, price: ce }, { time: t2, price: ce }],
      style: { stroke: col, dash: [3, 3] },
    });
  });

  // BOS/ChoCH lines — from swing origin to break bar
  (structureData.bos_events || []).forEach((ev, i) => {
    if (ev.time < winStart || ev.time > winEnd) return;
    const isBull = ev.direction === 'bullish';
    const isBos  = ev.event_type === 'bos';
    const color  = isBos ? (isBull ? '#3b82f6' : '#6366f1') : (isBull ? '#f97316' : '#ef4444');
    const lbl    = isBos ? (isBull ? '↑BOS' : '↓BOS') : (isBull ? '↑ChoCH' : '↓ChoCH');
    const t0     = ev.level_time
      ? Math.max(winStart, ev.level_time)
      : Math.max(winStart, ev.time - 3600);
    drawingEngine.state.drawings.push({
      id: 'auto_bos_' + i, type: 'smc', source: 'auto', label: lbl,
      points: [{ time: t0, price: ev.level }, { time: ev.time, price: ev.level }],
      style:  { stroke: color, dash: isBos ? [] : [5, 3] },
    });
  });

  drawingEngine.redraw();
}

// ── Drawing tools ─────────────────────────────────────────────────────────────
function setDrawMode(type) {
  if (!drawingEngine) return;
  drawMode = drawMode === type ? null : type;
  document.querySelectorAll('.draw-btn').forEach(b => b.classList.toggle('active', b.dataset.type === drawMode));
  if (!drawMode) {
    drawingEngine.setTool('cursor');
    document.getElementById('draw-status').textContent = '';
  } else if (MARKER_TOOLS.has(drawMode)) {
    // Marker modes: keep DrawingEngine in cursor so it doesn't intercept clicks
    drawingEngine.setTool('cursor');
    document.getElementById('draw-status').textContent = drawMode.toUpperCase() + ' — click candle';
  } else {
    drawingEngine.setTool(TOOL_MAP[drawMode] || drawMode);
    const hint = ['bos','choch','sweep','liq','ob','fvg'].includes(drawMode) ? '2 clicks' : '1 click';
    document.getElementById('draw-status').textContent = drawMode.toUpperCase() + ' — ' + hint;
  }
}

// Single-click marker placement for HH/HL/LL/LH
chart.subscribeClick(param => {
  if (!MARKER_TOOLS.has(drawMode) || !param.time || trades.length === 0) return;
  const key = labelKey(trades[currentIdx]);
  if (!userLabels[key]) userLabels[key] = {};
  if (!userLabels[key].markers) userLabels[key].markers = [];
  userLabels[key].markers.push({
    time:     Number(param.time),
    position: (drawMode === 'hh' || drawMode === 'lh') ? 'aboveBar' : 'belowBar',
    color:    MARKER_COLORS[drawMode],
    shape:    'circle',
    size:     1,
    text:     drawMode.toUpperCase(),
  });
  showTrade(currentIdx);  // re-render to show new marker
  _syncDrawings();
  setDrawMode(null);
});

function undoAnnotation() {
  if (!drawingEngine) return;
  const key = labelKey(trades[currentIdx]);
  const user = drawingEngine.state.drawings.filter(d => d.source !== 'auto');
  if (user.length > 0) {
    const lastId = user[user.length - 1].id;
    drawingEngine.state.drawings = drawingEngine.state.drawings.filter(d => d.id !== lastId);
    drawingEngine.redraw();
    _syncDrawings();
  } else if (userLabels[key] && userLabels[key].markers && userLabels[key].markers.length > 0) {
    userLabels[key].markers.pop();
    showTrade(currentIdx);
  }
}

function clearAnnotations() {
  if (!drawingEngine) return;
  drawingEngine.state.drawings = drawingEngine.state.drawings.filter(d => d.source === 'auto');
  drawingEngine.redraw();
  const key = labelKey(trades[currentIdx]);
  if (userLabels[key]) { userLabels[key].drawings = []; userLabels[key].markers = []; }
  showTrade(currentIdx);
}

// ── Meta / nav ────────────────────────────────────────────────────────────────
function updateMeta(t) {
  const fmt = s => new Date(s).toLocaleString('en-GB', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('m-entry').textContent  = fmt(t.entry_time);
  document.getElementById('m-dir').textContent    = t.direction;
  document.getElementById('m-rr').textContent = t.planned_rr != null ? `1:${t.planned_rr.toFixed(2)}` : '—';
  document.getElementById('m-duration').textContent = t.duration_min != null
    ? (t.duration_min >= 60 ? (t.duration_min/60).toFixed(1)+'h' : Math.round(t.duration_min)+'m') : '—';
  if (isBlind) {
    document.getElementById('m-exit').textContent   = 'hidden';
    document.getElementById('m-reason').textContent = t.label ? `(blind) · ${t.label}` : '(blind)';
    const rEl = document.getElementById('m-r');
    rEl.textContent = '—';
    rEl.style.color = '#ccc';
    document.getElementById('m-return').textContent = '—';
    return;
  }
  document.getElementById('m-exit').textContent   = fmt(t.exit_time);
  document.getElementById('m-reason').textContent = t.exit_reason;
  if (t.label) document.getElementById('m-reason').textContent = `${t.exit_reason} · ${t.label}`;
  const r = t.r_multiple;
  const rEl = document.getElementById('m-r');
  rEl.textContent = r != null ? (r >= 0 ? '+' : '') + r.toFixed(2) + 'R' : '—';
  rEl.style.color = r != null ? (r >= 0 ? '#22c55e' : '#ef4444') : '#ccc';
  const retEl = document.getElementById('m-return');
  const ret = t.return_pct;
  retEl.textContent = ret != null ? (ret >= 0 ? '+' : '') + ret.toFixed(3) + '%' : '—';
  retEl.style.color = ret != null ? (ret >= 0 ? '#22c55e' : '#ef4444') : '#ccc';
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentIdx <= 0;
  document.getElementById('btn-next').disabled = currentIdx >= trades.length - 1;
  document.getElementById('counter').textContent = (currentIdx + 1) + ' / ' + trades.length;
}

function navigate(dir) { showTrade(currentIdx + dir); }

// ── Stats bar ─────────────────────────────────────────────────────────────────
function renderStats(r) {
  if (!r) return;
  const pf = r.profit_factor || 0;
  const wr = r.win_rate || 0;
  const dd = r.max_drawdown_pct || 0;
  const t  = r.trades || 0;
  document.getElementById('stats').innerHTML =
    stat('T',  t, 'neu') +
    stat('WR', (wr*100).toFixed(1)+'%', wr>=0.55?'pos':wr>=0.45?'neu':'neg') +
    stat('PF', pf.toFixed(3), pf>=1.5?'pos':pf>=1.0?'neu':'neg') +
    stat('DD', (dd*100).toFixed(1)+'%', dd>0.1?'neg':'neu');
}
function stat(label, val, cls) {
  return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-value ${cls}">${val}</div></div>`;
}

// ── Trade list ────────────────────────────────────────────────────────────────
function renderTradeList() {
  const el = document.getElementById('trade-list');
  el.innerHTML = '';
  trades.forEach((t, i) => {
    const ul   = userLabels[labelKey(t)];
    const lc   = ul && ul.label ? ' labeled-' + ul.label : '';
    const dir  = t.direction === 'LONG' || t.direction.toLowerCase().includes('long') ? 'long' : 'short';
    const r    = isBlind ? null : t.r_multiple;
    const rStr = r != null ? (r>=0?'+':'') + r.toFixed(2) + 'R' : (isBlind ? 'blind' : '');
    const rCol = r != null ? (r>=0 ? '#22c55e' : '#ef4444') : '#888';
    const date = new Date(t.entry_time).toLocaleDateString('en-GB', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const exit = isBlind ? '' : (t.exit_reason === 'TP1' ? 'TP' : t.exit_reason === 'SL' ? 'SL' : (t.exit_reason||''));
    el.innerHTML += `
      <div class="trade-item${lc}" id="ti-${i}" onclick="showTrade(${i})">
        <div class="trade-num">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div class="trade-date">${date}</div>
          <span class="trade-dir dir-${dir}">${t.direction}</span>
        </div>
        <div>
          <div class="trade-r" style="color:${rCol}">${rStr}</div>
          <div class="trade-exit">${exit}</div>
        </div>
      </div>`;
  });
}

// ── Labels ────────────────────────────────────────────────────────────────────
function setLabel(l) {
  currentLabel = currentLabel === l ? null : l;
  document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
  if (currentLabel) document.querySelector('.label-btn.' + currentLabel)?.classList.add('active');
}

function labelKey(t) { return currentSymbol + '_' + currentTf + '_' + t.entry_time; }

async function saveLabel() {
  const t = trades[currentIdx];
  if (!t) return;
  const key   = labelKey(t);
  const notes = document.getElementById('notes').value;

  if (!userLabels[key]) userLabels[key] = {};
  userLabels[key].label = currentLabel;
  userLabels[key].notes = notes;
  if (drawingEngine) {
    userLabels[key].drawings = drawingEngine.state.drawings.filter(d => d.source !== 'auto');
  }

  const item = document.getElementById('ti-' + currentIdx);
  if (item) item.className = 'trade-item active' + (currentLabel ? ' labeled-' + currentLabel : '');

  fetch('/api/review/label', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      symbol: currentSymbol, tf: currentTf, strategy: currentStrategy,
      entry_time: t.entry_time, label: currentLabel, notes,
      params: currentParams,
      drawings: userLabels[key].drawings || [],
      markers:  userLabels[key].markers  || [],
    }),
  });

  if (currentIdx < trades.length - 1) navigate(1);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function bisect(arr, ts) {
  let lo = 0, hi = arr.length;
  while (lo < hi) { const mid = (lo+hi)>>1; if (arr[mid].time < ts) lo=mid+1; else hi=mid; }
  return lo;
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Loading…';
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

// boot
initDrawingEngine();

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'n') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'p') navigate(-1);
  if (e.key === 'g') setLabel('good');
  if (e.key === 'b') setLabel('bad');
  if (e.key === 's') setLabel('skip');
  if (e.key === 'Enter') saveLabel();
  if (e.key === 'Escape') setDrawMode(null);
  if (e.key === '1') setDrawMode('choch');
  if (e.key === '2') setDrawMode('bos');
  if (e.key === '3') setDrawMode('sweep');
  if (e.key === '4') setDrawMode('liq');
  if (e.key === '5') setDrawMode('ob');
  if (e.key === '6') setDrawMode('fvg');
  if (e.key === '7') setDrawMode('hh');
  if (e.key === '8') setDrawMode('hl');
  if (e.key === '9') setDrawMode('ll');
  if (e.key === '0') setDrawMode('lh');
  if (e.key === 'z') undoAnnotation();
});
</script>
