<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Entry | Journal Pro</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/_forms.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .price-inputs {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }

      /* Entry Specific Layout */
      .entry-layout {
        display: grid;
        grid-template-columns: 1fr 380px;
        height: calc(100vh - 64px);
        overflow: hidden;
        background: var(--bg);
      }

      .floating-toolbar {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel-solid);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 6px 12px;
        display: flex;
        align-items: center;
        gap: 4px;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .floating-toolbar .tool-btn {
        width: 36px;
        height: 36px;
        margin-bottom: 0;
      }

      .floating-toolbar .divider {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 8px;
      }

      .chart-top-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        display: flex;
        gap: 12px;
        z-index: 90;
      }
    </style>
  </head>

  <body class="theme-lingonberry">
    <nav class="main-nav">
      <div class="nav-left">
        <a href="/" class="nav-brand">
          <i data-lucide="layers"></i>
          Lingonberry <span>Journal</span>
        </a>
        <div class="nav-links">
          <a href="/mini" class="nav-link" id="nav-dashboard"
            ><i data-lucide="layout-dashboard"></i> Dashboard</a
          >
          <a href="/analytics" class="nav-link" id="nav-analytics"
            ><i data-lucide="bar-chart-3"></i> Analytics</a
          >
          <a href="/weekly" class="nav-link" id="nav-weekly"
            ><i data-lucide="calendar"></i> Weekly</a
          >
          <a href="/entry" class="nav-link active" id="nav-entry"
            ><i data-lucide="plus-circle"></i> New Trade</a
          >
        </div>
      </div>
      <div class="nav-right">
        <div id="accountSelector"></div>
      </div>
    </nav>

    <div class="entry-layout">
      <!-- Center Chart -->
      <section class="chart-center" style="position: relative">
        <!-- Top Left Controls -->
        <div class="chart-top-bar">
          <select
            id="symbolSelect"
            class="btn ghost btn-sm"
            style="
              background: var(--panel-solid);
              border: 1px solid var(--border);
            "
          >
            <option value="EURUSD">EURUSD</option>
            <option value="GBPUSD">GBPUSD</option>
            <option value="GBPJPY">GBPJPY</option>
            <option value="XAUUSD">XAUUSD</option>
          </select>
          <select
            id="timeframeSelect"
            class="btn ghost btn-sm"
            style="
              background: var(--panel-solid);
              border: 1px solid var(--border);
            "
          >
            <option value="M1">M1</option>
            <option value="M5">M5</option>
            <option value="M15">M15</option>
            <option value="M30" selected>M30</option>
            <option value="H1">H1</option>
            <option value="H4">H4</option>
            <option value="D">D</option>
          </select>
        </div>

        <!-- Floating Top Toolbar -->
        <div class="floating-toolbar" id="mainToolbar">
          <button class="tool-btn active" data-tool="cursor" title="Cursor (V)">
            <i data-lucide="mouse-pointer-2"></i>
          </button>
          <button class="tool-btn" data-tool="trendline" title="Trendline (L)">
            <i data-lucide="trending-up"></i>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <i data-lucide="square"></i>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <div class="divider"></div>
          <button class="tool-btn" data-tool="long" title="Long Tool">
            <i data-lucide="arrow-up-circle"></i>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <button class="tool-btn" data-tool="short" title="Short Tool">
            <i data-lucide="arrow-down-circle"></i>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <div class="divider"></div>
          <button class="tool-btn" data-tool="bos" title="BOS">
            <span class="text-xs font-bold">BOS</span>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <button class="tool-btn" data-tool="choch" title="CHoCH">
            <span class="text-xs font-bold">CH</span>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
          <button class="tool-btn" data-tool="sweep" title="Liquidity Sweep">
            <i data-lucide="zap"></i>
            <div class="tool-star"><i data-lucide="star"></i></div>
          </button>
        </div>

        <div
          class="muted text-xs"
          style="
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 80;
            background: var(--panel-solid);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
          "
        >
          Use <b>Long/Short</b> tool or Risk/Reward box to auto-populate form
        </div>

        <div
          id="chartContainer"
          style="
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #131722;
          "
        >
          <canvas id="drawLayer"></canvas>
          <div
            id="favoritesBar"
            class="favorites-bar"
            style="display: none"
          ></div>
        </div>
      </section>

      <!-- Right Form Panel -->
      <aside class="right-side-panel">
        <div class="review-card">
          <form
            id="tradeForm"
            style="display: flex; flex-direction: column; gap: 16px"
          >
            <h3>📝 New Trade Entry</h3>

            <div class="price-inputs">
              <div class="input-group">
                <label>Entry</label>
                <input
                  type="number"
                  step="0.00001"
                  id="entryPrice"
                  class="form-input"
                  required
                />
              </div>
              <div class="input-group">
                <label>SL</label>
                <input
                  type="number"
                  step="0.00001"
                  id="slPrice"
                  class="form-input"
                  required
                />
              </div>
              <div class="input-group">
                <label>TP</label>
                <input
                  type="number"
                  step="0.00001"
                  id="tpPrice"
                  class="form-input"
                  required
                />
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"
            >
              <div class="input-group">
                <label>% Risk</label>
                <input
                  type="number"
                  step="0.1"
                  id="riskPct"
                  value="1.0"
                  class="form-input"
                />
              </div>
              <div class="input-group">
                <label>Lots (Calc)</label>
                <input
                  type="number"
                  step="0.01"
                  id="lots"
                  class="form-input"
                  disabled
                  style="opacity: 0.6"
                />
              </div>
            </div>

            <div class="input-group">
              <label>Strategy / Setup</label>
              <select id="setup" class="form-select">
                <option value="breakout">Breakout</option>
                <option value="reversal">Reversal</option>
                <option value="trend_continuation">Trend Continuation</option>
                <option value="supply_demand">Supply / Demand</option>
              </select>
            </div>

            <div class="input-group">
              <label>Mindset</label>
              <select id="mindset" class="form-select">
                <option value="confident">Confident</option>
                <option value="neutral" selected>
                  Neutral / Following Plan
                </option>
                <option value="anxious">Anxious</option>
                <option value="revenge">Revenge / FOMO</option>
              </select>
            </div>

            <div class="input-group">
              <label>Notes</label>
              <textarea
                id="notes"
                rows="4"
                class="form-textarea"
                placeholder="Why this trade? Confluences..."
              ></textarea>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-full"
              style="padding: 14px; font-weight: bold"
            >
              Save & Log Trade
            </button>
          </form>
        </div>
      </aside>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/account-manager.js"></script>
    <script src="/static/js/drawing-engine.js"></script>
    <script src="/static/js/trade-entry-pro.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        new AccountManager();
        new TradeEntryPro();
        if (window.lucide) window.lucide.createIcons();
      });
    </script>
  </body>
</html>
