<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pine Review App</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="top-left">
          <div class="logo">
            <i data-lucide="bar-chart-3"></i>
            <span>PineReview</span>
          </div>
          <div class="controls-group">
            <select id="symbolSelect"></select>
            <select id="tfSelect"></select>
            <select id="backtestSelect">
              <option value="">Select Backtest...</option>
            </select>
            <label class="inline-check"><input type="checkbox" id="toggleIct" /> ICT Overlay</label>
            <label class="inline-check"><input type="checkbox" id="toggleTech" /> VWAP + EMA</label>
          </div>
          <div class="controls-group player-controls">
            <button id="playToggleBtn" class="btn-secondary" title="Play/Pause">Play</button>
            <button id="step1Btn" class="btn-secondary" title="Step 1 bar">&gt;</button>
            <button id="step5Btn" class="btn-secondary" title="Step 5 bars">&gt;&gt;</button>
            <span id="playbackStatus" class="muted">-</span>
          </div>
          <div class="btn-group">
            <button id="newSessionBtn" class="btn-secondary">
              New Session
            </button>
            <button id="saveBtn" class="btn-icon" title="Save Session">
              <i data-lucide="save"></i>
            </button>
          </div>
        </div>
        <div class="top-right">
          <button id="signalsBtn" class="btn-secondary">Signals</button>
          <button id="analyticsBtn" class="btn-secondary">Analytics</button>
          <button id="finishBtn" class="btn-primary">Finish Backtest</button>
        </div>
      </header>

      <main class="layout">
        <aside class="left-toolbar" id="leftTools"></aside>

        <section class="chart-area">
          <div class="floating-toolbar" id="floatingTools"></div>
          <div id="chartContainer"></div>
          <canvas id="drawLayer"></canvas>
        </section>

        <aside class="right-panel">
          <div class="panel-header">
            <h3>Trades</h3>
            <span id="tradeCount" class="badge">0</span>
          </div>
          <div id="tradeList" class="trade-list"></div>

          <div id="tradeEditor" class="trade-editor hidden">
            <div class="editor-header">
              <h4 id="editorTitle">Trade Detail</h4>
              <button class="btn-close" id="closeEditor">
                <i data-lucide="x"></i>
              </button>
            </div>
            <div id="directionSnapshot" class="direction-snapshot"></div>

            <div class="form-grid">
              <div class="form-field">
                <label>Direction</label>
                <select id="editDirection">
                  <option value="long">Long</option>
                  <option value="short">Short</option>
                </select>
              </div>
              <div class="form-field">
                <label>Entry</label>
                <input
                  id="editEntryPrice"
                  type="number"
                  step="any"
                  placeholder="0.00000"
                />
              </div>
              <div class="form-field">
                <label>Stop Loss</label>
                <input
                  id="editSL"
                  type="number"
                  step="any"
                  placeholder="0.00000"
                />
              </div>
              <div class="form-field">
                <label>Take Profit</label>
                <input
                  id="editTP"
                  type="number"
                  step="any"
                  placeholder="0.00000"
                />
              </div>
            </div>

            <div class="form-field">
              <label>Notes</label>
              <div id="noteTemplates" class="note-templates">
                <button class="btn-outline note-chip" data-note-template="entered from an order block for ny reversal after choch + bos confirmation">NY Reversal</button>
                <button class="btn-outline note-chip" data-note-template="entered 2nd trade from an order block towards high of the fwg on 30m">2nd OB to 30m FVG</button>
                <button class="btn-outline note-chip" data-note-template="placed long trade from an order block which has taken 50% fwg liquidity">OB + 50% FVG</button>
                <button class="btn-outline note-chip" data-note-template="invalid because there was more liquidity [open fwg] below">Invalid: Open FVG Below</button>
              </div>
              <textarea
                id="editNotes"
                placeholder="Write trade notes..."
              ></textarea>
            </div>

            <div class="form-grid">
              <div class="form-field">
                <label>Setup Grade</label>
                <select id="editSetupGrade">
                  <option value="">-</option>
                  <option value="a_plus">A+</option>
                  <option value="a">A</option>
                  <option value="b">B</option>
                  <option value="c">C</option>
                </select>
              </div>
              <div class="form-field">
                <label>Entry Model</label>
                <select id="editEntryModel">
                  <option value="">-</option>
                  <option value="ob_retest">OB Retest</option>
                  <option value="fvg_50">50% FVG</option>
                  <option value="vwap_reclaim">VWAP Reclaim</option>
                  <option value="ema_bounce">EMA Bounce</option>
                  <option value="sweep_reversal">Sweep Reversal</option>
                </select>
              </div>
              <div class="form-field">
                <label>HTF Bias</label>
                <select id="editHtfBias">
                  <option value="">-</option>
                  <option value="bullish">Bullish</option>
                  <option value="bearish">Bearish</option>
                  <option value="neutral">Neutral</option>
                </select>
              </div>
              <div class="form-field">
                <label>Session</label>
                <select id="editSessionTag">
                  <option value="">-</option>
                  <option value="london">London</option>
                  <option value="ny">NY</option>
                  <option value="asia">Asia</option>
                </select>
              </div>
              <div class="form-field">
                <label>Trigger</label>
                <select id="editTriggerTag">
                  <option value="">-</option>
                  <option value="choch_bos">CHOCH + BOS</option>
                  <option value="ob_retest">Order Block Retest</option>
                  <option value="liquidity_sweep">Liquidity Sweep</option>
                  <option value="fvg_50">50% FVG</option>
                </select>
              </div>
              <div class="form-field">
                <label>Invalidator</label>
                <select id="editInvalidatorTag">
                  <option value="">-</option>
                  <option value="open_fvg_below">Open FVG Below</option>
                  <option value="against_htf">Against HTF Bias</option>
                  <option value="late_entry">Late Entry</option>
                  <option value="no_displacement">No Displacement</option>
                </select>
              </div>
              <div class="form-field">
                <label>Target Model</label>
                <select id="editTargetModel">
                  <option value="">-</option>
                  <option value="asia_high_low">Asia High/Low</option>
                  <option value="prev_high_low">Previous High/Low</option>
                  <option value="round_level">Round Level</option>
                  <option value="fvg_fill">FVG Fill</option>
                  <option value="liquidity_pool">Liquidity Pool</option>
                </select>
              </div>
              <div class="form-field">
                <label>Why Valid</label>
                <select id="editWhyValid">
                  <option value="">-</option>
                  <option value="htf_with_structure">HTF + Structure</option>
                  <option value="sweep_then_reclaim">Sweep then Reclaim</option>
                  <option value="choch_bos_retest">CHOCH/BOS Retest</option>
                  <option value="trend_continuation">Trend Continuation</option>
                  <option value="post_news_confirmation">Post-News Confirmation</option>
                </select>
              </div>
            </div>

            <div class="editor-footer">
              <button id="markDoneBtn" class="btn-success">
                <i data-lucide="check"></i> Mark Corrected
              </button>
              <button id="skipTradeBtn" class="btn-outline">
                <i data-lucide="skip-forward"></i> Skip
              </button>
              <button id="nextTradeBtn" class="btn-secondary">
                Next <i data-lucide="chevron-right"></i>
              </button>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="/static/app.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
