<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #2a2a2a);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            margin: 10px 0;
        }

        .btn {
            background: var(--tg-theme-button-color, #8774e1);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .success {
            color: #10b981;
        }

        .info {
            color: var(--tg-theme-hint-color, #aaa);
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="emoji">📊</div>
            <h1>Trading Journal</h1>
            <p class="success">✅ Mini App is working!</p>
            <p class="info">Loaded via Telegram WebApp API</p>
        </div>

        <div class="card" id="userInfo">
            <h2>User Info</h2>
            <p id="userData">Loading...</p>
        </div>

        <div class="card">
            <h2>Quick Commands</h2>
            <p><code>/journal</code> - Log a new trade</p>
            <p><code>/stats</code> - View statistics</p>
            <p><code>/open</code> - See open positions</p>
            <p><code>/weekly</code> - Weekly review</p>
        </div>

        <div class="card">
            <button class="btn" onclick="tg.close()">Close Mini App</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Display user info
        const user = tg.initDataUnsafe.user;
        const userDataEl = document.getElementById('userData');

        if (user) {
            userDataEl.innerHTML = `
                <p><strong>Name:</strong> ${user.first_name} ${user.last_name || ''}</p>
                <p><strong>Username:</strong> @${user.username || 'N/A'}</p>
                <p><strong>ID:</strong> ${user.id}</p>
                <p class="info">Telegram WebApp API is working correctly!</p>
            `;
        } else {
            userDataEl.innerHTML = '<p class="info">Open this from Telegram bot to see user data</p>';
        }

        // Log for debugging
        console.log('Telegram WebApp initialized:', tg);
        console.log('User data:', user);
        console.log('Init data:', tg.initData);
    </script>
</body>

</html>
