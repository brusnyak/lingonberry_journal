<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Journal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a1a);
      color: var(--tg-theme-text-color, #ffffff);
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #2a2a2a);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .stat-label {
      color: var(--tg-theme-hint-color, #aaa);
    }

    .stat-value {
      font-weight: 600;
    }

    .positive {
      color: #10b981;
    }

    .negative {
      color: #ef4444;
    }

    .btn {
      background: var(--tg-theme-button-color, #8774e1);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="app">
      <div class="loading">Loading your trading data...</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_BASE = 'http://localhost:5000/api';  // Change to your deployed backend

    async function loadDashboard() {
      try {
        const user = tg.initDataUnsafe.user;
        if (!user) {
          document.getElementById('app').innerHTML = `
                        <div class="card">
                            <h1>⚠️ Not in Telegram</h1>
                            <p>This app must be opened from Telegram bot.</p>
                        </div>
                    `;
          return;
        }

        // Try to fetch stats from your backend
        const res = await fetch(`${API_BASE}/dashboard`);
        if (!res.ok) throw new Error('Backend not available');

        const data = await res.json();
        const stats = data.stats;

        document.getElementById('app').innerHTML = `
                    <h1>📊 Trading Dashboard</h1>
                    
                    <div class="card">
                        <h2>Performance</h2>
                        <div class="stat">
                            <span class="stat-label">Total Trades</span>
                            <span class="stat-value">${stats.total_trades}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Win Rate</span>
                            <span class="stat-value">${stats.win_rate.toFixed(1)}%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Net P&L</span>
                            <span class="stat-value ${stats.total_pnl_usd >= 0 ? 'positive' : 'negative'}">
                                ${stats.total_pnl_usd >= 0 ? '+' : ''}$${stats.total_pnl_usd.toFixed(2)}
                            </span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Profit Factor</span>
                            <span class="stat-value">${stats.profit_factor.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Quick Actions</h2>
                        <button class="btn" onclick="tg.close()">Close</button>
                    </div>
                `;
      } catch (err) {
        // Backend not available - show static message
        document.getElementById('app').innerHTML = `
                    <h1>📊 Trading Journal</h1>
                    
                    <div class="card">
                        <h2>Welcome!</h2>
                        <p>Your trading journal is set up.</p>
                        <p style="margin-top: 10px; color: var(--tg-theme-hint-color, #aaa);">
                            To see live data, make sure your Flask backend is running and update the API_BASE URL in this file.
                        </p>
                    </div>

                    <div class="card">
                        <h2>Quick Commands</h2>
                        <p><code>/journal</code> - Log a new trade</p>
                        <p><code>/stats</code> - View statistics</p>
                        <p><code>/open</code> - See open positions</p>
                        <p><code>/weekly</code> - Weekly review</p>
                    </div>

                    <div class="card">
                        <button class="btn" onclick="tg.close()">Close</button>
                    </div>
                `;
      }
    }

    loadDashboard();
  </script>
</body>

</html>
